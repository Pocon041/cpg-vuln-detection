paths:
  dataset_root: data/fq_graphml_dataset
  metadata_csv: data/fq_graphml_dataset/metadata/labels.csv
  source_root: F&Q/F&Q
  excluded_csv: data/fq_dataset/fq_dataset/metadata/excluded.csv
  artifacts_dir: artifacts
  outputs_dir: outputs

source_mapping:
  default_line_offset: 64
  source_map_path: artifacts/manifests/source_map.csv
  prepared_source_root: null
  overrides_path: configs/source_map_overrides.csv
  validate_offsets: true
  allow_sample_overrides: true
  validation:
    max_sampled_nodes: 32
    context_radius: 2
    minimum_token_match_ratio: 0.5

features:
  node_text_normalization:
    mode: raw
    version: 1
    api_taxonomy_version: 1
    tokenizer_version: 2
  word2vec_training_scope: transductive
  word2vec_dim: 128
  word2vec_epochs: 10
  word2vec_batch_size: 1024
  codebert_model: microsoft/codebert-base
  codebert_node_max_length: 64
  codebert_batch_size: 64
  function_max_tokens: 510
  function_overlap: 256

model:
  hidden_dim: 128
  node_type_dim: 32
  dropout: 0.3

devign:
  hidden_dim: 200
  dropout: 0.2
  steps: 6
  max_nodes: 205
  weight_decay: 0.0000013

training:
  epochs: 50
  patience: 8
  checkpoint_metric: pr_auc
  loss: focal
  focal_gamma: 2.0
  class_weight: [1.2, 1.0]
  weight_decay: 0.0001
  gradient_clip: 1.0
  max_nodes: 8000
  max_edges: 60000
  seed: 42
  device: cuda

ramp:
  margin: 0.5
  lambda_replay: 0.5
  lambda_rank: 0.25
  warmup_epochs: 3
  max_pairs_per_positive: 3
  minimum_pair_score: 0.2
  semi_hard_lower_percentile: 0.05
  semi_hard_upper_percentile: 0.30
  pair_batch_size: 2
  max_pair_nodes: 8000
  max_pair_edges: 60000
  replay_steps_per_epoch: 200

ramp_v3:
  slice_top_k: 3
  slice_temperature: 1.0
  lambda_auxiliary: 0.2
  rank_warmup_epochs: 5
  rank_ramp_epochs: 5
